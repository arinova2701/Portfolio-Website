<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arinova | Maneesh Ari </title>
  <meta name="description" content="Portfolio of Maneesh Ari (Arinova) — ML Engineer, AI & Automation specialist, B.Tech CS'27 VIT Vellore. Open to internships and part-time roles.">
  <link rel="icon" type="image/png" href="fevicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Noise video overlay -->
  <video class="noise-video" autoplay muted loop playsinline aria-hidden="true">
    <source src="Noise Video 200560.mp4" type="video/mp4">
  </video>

  <!-- Matrix background video -->
  <video class="matrix-video" autoplay muted loop playsinline aria-hidden="true">
    <source src="Matrix-video.mp4" type="video/mp4">
  </video>

  <!-- Lily decorations -->
  <img src="HD top rleft lily.png" alt="" class="lily lily-top-left" aria-hidden="true">
  <img src="HD bottom right lily.png" alt="" class="lily lily-bottom-right" aria-hidden="true">

  <!-- Page wrapper -->
  <div class="page-wrapper">

  <!-- Header -->
<header class="fade-in fade-in-delay-1">
  <a href="#" class="connect-btn" id="connect-btn">CONNECT</a>
  <nav class="social-nav" id="social-nav">
    <a href="https://github.com/arinova2701" class="nav-link" id="link-gh" data-tooltip="GitHub" target="_blank" rel="noopener noreferrer">[GH]</a>
<a href="https://www.linkedin.com/in/maneesh-ari" class="nav-link" id="link-in" data-tooltip="LinkedIn" target="_blank" rel="noopener noreferrer">[IN]</a>
<a href="#" class="nav-link" id="link-mail" data-tooltip="Send a message">[MAIL]</a>
  </nav>
</header>

    <!-- Hero -->
    <main class="hero" id="hero">
      <div class="hero-visual fade-in fade-in-delay-3">
        <img src="Arinova.png" alt="ARINOVA" class="arinova-img">
        <div class="role-container">
          <span class="role-bracket">[</span>
          <span id="role-text" class="role-text">ML ENGINEER</span>
          <span class="role-bracket">]</span>
        </div>
        <img src="Maneesh Ari.png" alt="Maneesh Ari" class="name-img">
      </div>

     <svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="goo" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.015" numOctaves="1" result="noise" seed="3" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="28" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>

      <div class="hero-info fade-in fade-in-delay-4">
        <span class="subtitle">HYDERABAD, INDIA / B.Tech CS'27 VIT VELLORE</span>
        <span class="plus-signs">+&ensp;+&ensp;+</span>
      </div>

      <div class="terminal-line fade-in fade-in-delay-5">
        <span class="terminal-arrow">&gt;</span><span class="terminal-dollar">$</span><span class="terminal-text" id="terminal-text"></span><span class="cursor">_</span>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <!-- <div class="divider"></div> -->
      <p class="production-text">PORTFOLIO IS CURRENTLY IN PRODUCTION</p>
      <p class="copyright">&copy; 2026 ArinovaDev. All rights reserved.</p>
    </footer>

  </div>

  <!-- Mail modal -->
  <div id="mail-modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="Close">&times;</button>
      <h2 id="modal-title" class="modal-title">GET IN TOUCH</h2>
      <form id="contact-form" class="contact-form" novalidate>
        <div class="form-group">
          <label for="form-name">NAME</label>
          <input type="text" id="form-name" name="name" required autocomplete="name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="form-email">EMAIL</label>
          <input type="email" id="form-email" name="email" required autocomplete="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="form-message">MESSAGE</label>
          <textarea id="form-message" name="message" rows="4" required placeholder="What's on your mind?"></textarea>
        </div>
        <button type="submit" class="form-submit">SEND</button>
      </form>
    </div>
  </div>

 <script src="https://unpkg.com/@emailjs/browser@4/dist/email.min.js"></script>
<script src="script.js"></script>
</body>
<div class="cursor-dot" id="cursor-dot"></div>
</html>
